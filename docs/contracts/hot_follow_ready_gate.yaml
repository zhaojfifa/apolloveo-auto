version: "0.1"
contract_status: "frozen-draft-for-p0"
line_id: "hot_follow_line"
task_kind: "hot_follow"
target_result_type: "final_video"

contract_refs:
  line_contract: "docs/contracts/hot_follow_line_contract.md"
  sop_profile: "docs/runbooks/hot_follow_sop.md"
  status_policy: "gateway/app/services/status_policy/hot_follow_state.py"
  runtime_mirror_spec: "gateway/app/services/ready_gate/hot_follow_rules.py::HOT_FOLLOW_GATE_SPEC"
  runtime_evaluator: "gateway/app/services/ready_gate/engine.py::evaluate_ready_gate"

runtime_rules:
  signals:
    final_exists:
      source: final_exists
    final_fresh:
      source: final_fresh
    audio_done:
      source: audio_done
    voiceover_exists:
      source: voiceover_exists
    tts_voice_valid:
      source: tts_voice_valid
    audio_ready:
      source: audio_ready
      reason_key: audio_ready_reason
      reason_source: audio_ready_reason
    subtitle_artifact_exists:
      source: subtitle_artifact_exists
    subtitle_ready:
      source: subtitle_ready
      reason_key: subtitle_ready_reason
      reason_source: subtitle_ready_reason
    no_dub:
      source: no_dub
      reason_key: no_dub_reason
      reason_source: no_dub_reason
    no_dub_compose_allowed:
      source: no_dub_compose_allowed
  overrides:
    - evidence_signal: voiceover_exists
      target_signal: no_dub
      force_value: false
    - evidence_signal: audio_ready
      target_signal: no_dub
      force_value: false
  gates:
    - name: compose_ready
      requires:
        - final_exists
        - final_fresh
      unless_any:
        - audio_ready
        - no_dub
    - name: publish_ready
      requires:
        - compose_ready
  blocking_rules:
    - reason: compose_not_done
      when_missing: __always__
      parent_gate: compose_ready
    - reason: final_stale
      when_missing: final_fresh
      extra_requires:
        - final_exists
      parent_gate: compose_ready
    - reason: subtitle_not_ready
      when_missing: subtitle_ready
      unless_signal: no_dub_compose_allowed
      parent_gate: compose_ready
    - reason: audio_not_done
      when_missing: audio_done
      unless_signal: no_dub
      parent_gate: compose_ready
    - reason: voiceover_missing
      when_missing: voiceover_exists
      unless_signal: no_dub
      parent_gate: compose_ready
    - reason: tts_voice_invalid
      when_missing: tts_voice_valid
      unless_signal: no_dub
      parent_gate: compose_ready
    - reason: audio_not_ready
      when_missing: audio_ready
      unless_signal: no_dub
      extra_requires:
        - final_exists
      parent_gate: compose_ready
    - when_missing: subtitle_ready
      extra_requires:
        - no_dub
      unless_signal: no_dub_compose_allowed
      reason_from: no_dub_reason
      parent_gate: compose_ready

signal_families:
  artifact_facts:
    - "final.exists"
    - "historical_final.exists"
    - "voiceover.exists"
    - "target_subtitle.exists"
  step_facts:
    - "audio.status"
    - "subtitles.subtitle_ready"
    - "audio.audio_ready"
    - "audio.no_dub"
  currentness_facts:
    - "final.fresh"
    - "target subtitle authoritative/current"
    - "dub current against subtitle + audio config"

gates:
  compose_ready:
    description: >
      The main final deliverable is materially ready and does not require
      another compose run for the current subtitle/dub/render inputs.
    runtime_formula:
      all_of:
        - "final_exists"
        - "final_fresh"
      any_of:
        - "audio_ready"
        - "no_dub"
    required_artifact_conditions:
      - "current final output exists"
      - "if audio path is used, voiceover artifact exists"
      - "target subtitle artifact exists, subtitle lane explicitly reports ready, or no_dub compose is explicitly allowed for empty target/dub input"
    required_step_conditions:
      - "subtitle lane must be ready before compose is operationally unblocked unless empty target/dub input has explicit no_dub compose allowance"
      - "dub lane must be ready unless no_dub branch is active"
    currentness_conditions:
      - "final must be fresh against current subtitle/dub/render inputs"
      - "target subtitle must be the authoritative current target subtitle"
      - "current dub must match the authoritative target subtitle and active audio config"
    blocking_reasons:
      - "compose_not_done"
      - "final_stale"
      - "subtitle_not_ready"
      - "audio_not_done"
      - "voiceover_missing"
      - "tts_voice_invalid"
      - "audio_not_ready"
      - "no_dub_reason when no_dub is true, subtitle lane is not ready, and no_dub compose allowance is not active"
    operator_confirmation_hooks: []

  publish_ready:
    description: >
      Final output may proceed to publish/distribution because compose-ready
      truth is satisfied.
    runtime_formula:
      all_of:
        - "compose_ready"
    required_artifact_conditions:
      - "current final output exists"
    required_step_conditions:
      - "compose_ready is true"
    currentness_conditions:
      - "final remains fresh for the current subtitle/dub/render inputs"
    operator_confirmation_hooks:
      - "before_publish"

operator_confirmation_hooks:
  before_publish:
    enabled: true
    owner: "operator"
    source: "hot_follow_line_contract.confirmation_policy.before_publish"
    purpose: "final publish confirmation"

policy_notes:
  - "This YAML now provides the runtime-backed gate spec source; Python keeps the signal extractor library and evaluator only."
  - "Optional artifacts such as pack/scene pack are not compose_ready or publish_ready prerequisites."
  - "Board/workbench/publish projection should consume ready-gate truth rather than raw step status alone."
